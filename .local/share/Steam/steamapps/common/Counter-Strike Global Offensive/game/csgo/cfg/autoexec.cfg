exec crosshair/default

// sensitivty 1.25
zoom_sensitivity_ratio 1.0

viewmodel_fov 68
viewmodel_offset_x 2.5
viewmodel_offset_y 0
viewmodel_offset_z -1.5
viewmodel_presetpos 1

cl_hud_color 11
cl_hud_radar_scale 1
cl_radar_always_centered 1
cl_radar_icon_scale_min 0.6
cl_radar_rotate 1
cl_radar_scale 0.7
cl_radar_square_with_scoreboard 1

fps_max 500
rate 786432

hud_scaling 1
hud_showtargetid 1

bind f "slot7"
bind z "slot6"
bind x "slot8"
bind c "slot10"

alias +qswap "lastinv"
alias -qswap "lastinv"
bind q "+qswap"
